[accounts.impactquadrant]
email = "zan@impactquadrant.info"
display-name = "Zan"
default = true

[accounts.impactquadrant.backend]
type = "imap"
host = "imap.gmail.com"
port = 993
encryption.type = "tls"
login = "zan@impactquadrant.info"
auth.type = "password"
# Password is read from the environment, never hardcoded.
# Set GMAIL_APP_PASSWORD (see .env.example) before running himalaya.
auth.cmd = "printenv GMAIL_APP_PASSWORD"

[accounts.impactquadrant.message.send.backend]
type = "smtp"
host = "smtp.gmail.com"
port = 587
encryption.type = "start-tls"
login = "zan@impactquadrant.info"
auth.type = "password"
# Password is read from the environment, never hardcoded.
# Set GMAIL_APP_PASSWORD (see .env.example) before running himalaya.
auth.cmd = "printenv GMAIL_APP_PASSWORD"

[accounts.impactquadrant.folder.alias]
sent = "[Gmail]/Sent Mail"
